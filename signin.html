<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Vynix</title>
<link rel="icon" href="assets/vynixS.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <nav>
    <a class="brand" href="index.html">
      <img src="assets/vynixS.png" alt="Vynix icon">
      <span>VYNIX</span>
    </a>
    <div class="navlinks">
      <a href="index.html#crafts">Crafts</a>
      <a href="index.html#leaders">Leadership</a>
    </div>
  </nav>
</header>

<main>

  <!-- ============ SIGNED OUT: auth card ============ -->
  <div id="authView">
    <div class="page-head">
      <div class="eyebrow" style="justify-content:center;display:flex;">ACCOUNT</div>
      <h1>Sign in to Vynix</h1>
      <p>Sign in to submit a join request or check its status.</p>
    </div>

    <div class="wrap-narrow" style="padding-bottom:100px;">
      <div class="card">
        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-tab="signin">Sign in</button>
          <button type="button" class="auth-tab" data-tab="signup">Create account</button>
        </div>

        <div id="authMessage" class="form-message"></div>

        <button type="button" id="googleBtn" class="google-btn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
          Continue with Google
        </button>

        <div class="divider">OR</div>

        <form id="emailForm" class="form-grid">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="emailSubmitBtn">Sign in</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ============ SIGNED IN: account dashboard ============ -->
  <div id="accountView" style="display:none;">
    <div class="page-head">
      <div class="eyebrow" style="justify-content:center;display:flex;">ACCOUNT</div>
      <h1>Your Vynix account</h1>
    </div>

    <div class="wrap-narrow" style="padding-bottom:100px;">
      <div class="card account-card">
        <div class="account-row">
          <span class="label">Signed in as</span>
          <span class="value" id="accountEmail"></span>
        </div>
        <button type="button" class="btn btn-ghost" id="signOutBtn">Sign out</button>
      </div>

      <div style="height:24px;"></div>

      <div id="requestArea"></div>
    </div>
  </div>

</main>

<footer>
  <div class="foot-inner">
    <div class="brand"><img src="assets/vynixS.png" alt="Vynix icon"></div>
    <p>© 2026 VYNIX — WORLDS · CODE · FRAMES</p>
  </div>
</footer>

<script type="module">
  import {
    watchAuth, signInWithEmail, signUpWithEmail, signInWithGoogle,
    signOutUser, authErrorMessage, listenMyRequests
  } from "./app.js";

  const params = new URLSearchParams(window.location.search);
  const redirectTo = params.get("redirect");

  const authView = document.getElementById("authView");
  const accountView = document.getElementById("accountView");
  const authMessage = document.getElementById("authMessage");
  const emailForm = document.getElementById("emailForm");
  const emailSubmitBtn = document.getElementById("emailSubmitBtn");
  const googleBtn = document.getElementById("googleBtn");
  const tabs = document.querySelectorAll(".auth-tab");
  const accountEmail = document.getElementById("accountEmail");
  const requestArea = document.getElementById("requestArea");
  const signOutBtn = document.getElementById("signOutBtn");

  let mode = "signin"; // or "signup"
  let unsubRequests = null;

  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      tabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      mode = tab.dataset.tab;
      emailSubmitBtn.textContent = mode === "signup" ? "Create account" : "Sign in";
      authMessage.className = "form-message";
    });
  });

  function showAuthMessage(text, type) {
    authMessage.textContent = text;
    authMessage.className = "form-message show " + type;
  }

  emailForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    emailSubmitBtn.disabled = true;
    emailSubmitBtn.innerHTML = '<span class="spinner"></span>';

    try {
      if (mode === "signup") {
        await signUpWithEmail(email, password);
      } else {
        await signInWithEmail(email, password);
      }
      // onAuthStateChanged below handles the redirect / view swap
    } catch (err) {
      showAuthMessage(authErrorMessage(err), "error");
      emailSubmitBtn.disabled = false;
      emailSubmitBtn.textContent = mode === "signup" ? "Create account" : "Sign in";
    }
  });

  googleBtn.addEventListener("click", async () => {
    try {
      await signInWithGoogle();
    } catch (err) {
      showAuthMessage(authErrorMessage(err), "error");
    }
  });

  signOutBtn.addEventListener("click", () => signOutUser());

  function renderRequests(requests) {
    if (!requests.length) {
      requestArea.innerHTML = `
        <div class="card" style="text-align:center;">
          <div class="status-badge none" style="margin-bottom:14px;">No request yet</div>
          <p style="color:var(--slate);font-size:0.9rem;margin-bottom:22px;">You haven't applied to join the team.</p>
          <a href="join.html" class="btn btn-primary btn-block">Apply to join</a>
        </div>`;
      return;
    }

    const latest = requests[0];
    const statusLabel = {
      pending: "Pending review",
      accepted: "Accepted",
      declined: "Declined",
    }[latest.status] || latest.status;

    let note = "";
    if (latest.status === "pending") note = "The leaders are reviewing your request.";
    if (latest.status === "accepted") note = "Welcome in — a leader will be in touch about next steps.";
    if (latest.status === "declined") note = "This request wasn't accepted this time.";

    requestArea.innerHTML = `
      <div class="card request-summary">
        <div class="account-row">
          <h3>${escapeHtml(latest.fullName)}</h3>
          <div class="status-badge ${latest.status}">${statusLabel}</div>
        </div>
        <p class="meta">${note}</p>
        <div class="account-row"><span class="label">Role</span><span class="value">${escapeHtml(roleLabel(latest.role))}</span></div>
      </div>`;
  }

  function roleLabel(role) {
    return { "games-dev": "Games dev", "photo-editor": "Photo editor", "html-sites-creator": "HTML / sites creator" }[role] || role;
  }
  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str || "";
    return d.innerHTML;
  }

  watchAuth((user) => {
    if (user) {
      if (redirectTo) {
        window.location.href = redirectTo;
        return;
      }
      authView.style.display = "none";
      accountView.style.display = "block";
      accountEmail.textContent = user.email || "";

      if (unsubRequests) unsubRequests();
      unsubRequests = listenMyRequests(user.uid, renderRequests, (err) => {
        requestArea.innerHTML = `<div class="card"><div class="form-message show error">
          Couldn't load your request: ${err.code || err.message || "unknown error"}.
          Check the browser console — this is usually unpublished Firestore rules or a
          missing composite index.
        </div></div>`;
      });
    } else {
      authView.style.display = "block";
      accountView.style.display = "none";
      if (unsubRequests) { unsubRequests(); unsubRequests = null; }
    }
  });
</script>
</body>
</html>
